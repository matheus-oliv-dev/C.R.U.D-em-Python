{% extends "core/base.html" %}

{% block title %}Salvar Produto{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card card-custom mt-4">
            <div class="card-header border-0 pb-0">
                <h3 class="card-title fw-bold text-gradient mb-0" {% if object %}data-i18n="form_title_edit"{% else %}data-i18n="form_title_create"{% endif %}>
                    {% if object %}Editar{% else %}Novo{% endif %} Produto
                </h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-4">
                        <label for="{{ field.id_for_label }}" class="form-label" data-i18n="label_{{ field.name }}">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}"
                            id="{{ field.id_for_label }}"
                            class="form-control form-control-custom {% if field.errors %}is-invalid{% endif %}"
                            value="{{ field.value|default_if_none:'' }}" step="0.01">
                        {% if field.errors %}
                        <div class="invalid-feedback">
                            {{ field.errors }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid gap-3 d-md-flex justify-content-md-end mt-5">
                        <a href="{% url 'produto_list' %}" class="btn btn-outline-custom px-4" data-i18n="form_cancel">Cancelar</a>
                        <button type="submit" class="btn btn-primary-custom px-5" data-i18n="form_save">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Sistema de Limite de Caracteres Duro e Dupla Verificação
document.addEventListener("DOMContentLoaded", function() {
    // Localiza o input gerado pelo Django cujo ID é id_nome_produto
    const nomeInput = document.getElementById("id_nome_produto");
    
    if (nomeInput) {
        // 1. Limite Duro no HTML
        nomeInput.setAttribute("maxlength", "100");
        
        // 2. Elemento visual de contagem
        const counterDiv = document.createElement("div");
        counterDiv.className = "text-end mt-1 small";
        counterDiv.style.color = "#a8a8a8"; 
        counterDiv.id = "char-counter";
        
        // Injeta logo abaixo do input
        nomeInput.parentNode.insertBefore(counterDiv, nomeInput.nextSibling);
        
        function updateCounter() {
            // 3. Slice dinâmico no Javascript (Mesma tática do seu Flask bot)
            let currentLength = nomeInput.value.length;
            if (currentLength > 100) {
                nomeInput.value = nomeInput.value.slice(0, 100);
                currentLength = 100;
            }
            
            counterDiv.textContent = currentLength + " / 100";
            
            // Muda de cor se chegar no limite
            if (currentLength >= 100) {
                counterDiv.style.color = "#f64a4a"; // Vermelho alerta
            } else {
                counterDiv.style.color = "#a8a8a8"; // Cinza normal
            }
        }
        
        // Aciona toda vez que o usuário digitar ou colar um texto
        nomeInput.addEventListener("input", updateCounter);
        // Roda uma vez no início (para a tela de "Editar Produto")
        updateCounter();
    }
});
</script>
{% endblock %}
